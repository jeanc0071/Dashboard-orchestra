<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#080b10">
  <title>Pilotage-Projets-Codex</title>
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <a class="brand" href="#supervision" data-view-link="supervision" aria-label="Codex Project Control">
        <span class="brand-mark">PC</span>
        <span><strong>Project Control</strong><small>Codex · distant</small></span>
      </a>
      <nav class="main-nav" aria-label="Navigation principale">
        <button class="nav-item active" data-view="supervision"><span>01</span>Supervision<i id="nav-alert-count">0</i></button>
        <button class="nav-item" data-view="project"><span>02</span>Vue projet</button>
        <button class="nav-item" data-view="timeline"><span>03</span>Chronologie</button>
        <button class="nav-item" data-view="blockers"><span>04</span>Blocages</button>
        <button class="nav-item" data-view="ecosystem"><span>05</span>Écosystème</button>
        <button class="nav-item" data-view="help"><span>06</span>Aide / Guide</button>
        <button class="nav-item" data-view="settings"><span>07</span>Paramètres</button>
        <button class="nav-item" data-view="intake"><span>08</span>Notes, idées et bugs</button>
        <button class="nav-item" data-view="changelog"><span>09</span>Changelog</button>
        <button class="nav-item" data-view="initiatives"><span>10</span>Initiatives</button>
      </nav>
      <div class="sidebar-foot">
        <div class="connection"><span id="connection-dot" class="connection-dot"></span><span id="connection-label">Connexion…</span></div>
        <p>Vue distante · snapshot public · lecture seule</p>
      </div>
    </aside>

    <main class="main-content">
      <header id="topbar" class="topbar">
        <div>
          <p class="eyebrow" id="view-eyebrow">VUE GLOBALE</p>
          <h1 id="view-title">Supervision temps réel</h1>
        </div>
        <div class="top-actions">
          <div class="project-selector">
            <span class="project-picker-wrap">Projets</span>
            <button id="project-selector-button" class="project-selector-button" type="button" disabled><span>Tous les projets publiés</span><span aria-hidden="true">▾</span></button>
          </div>
          <div class="freshness" title="Fraîcheur de la collecte">
            <span class="live-pulse"></span>
            <span><small>Dernière collecte</small><strong id="last-update">—</strong></span>
          </div>
          <button id="refresh-button" class="refresh-button" type="button">Actualiser</button>
        </div>
      </header>

      <div id="global-error" class="global-error hidden" role="alert"></div>
      <section id="view-root" class="view-root" aria-live="polite">
        <div class="loading-state"><span></span><p>Chargement du snapshot distant…</p></div>
      </section>
    </main>
  </div>
  <div class="chrome-controls" role="group" aria-label="Affichage de l’espace de travail">
    <button id="toggle-sidebar" type="button" aria-controls="sidebar" aria-expanded="true" aria-pressed="false"><span aria-hidden="true">☰</span><span>Navigation</span></button>
    <button id="toggle-topbar" type="button" aria-controls="topbar" aria-expanded="true" aria-pressed="false"><span aria-hidden="true">↕</span><span>Barre supérieure</span></button>
    <button id="toggle-focus" type="button" aria-pressed="false"><span aria-hidden="true">◎</span><span>Concentration</span></button>
  </div>
</body>
</html>
